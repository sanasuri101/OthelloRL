# Othello RL Training Configuration
# Used by train.py — all values are overridable via CLI flags (--section.key value)

[env]
# Number of parallel Othello games inside the C engine
num_envs = 512

[train]
# Experiment bookkeeping
exp_name = othello_ppo
data_dir = experiments

# Reproducibility
seed = 42
torch_deterministic = True

# Hardware
device = cpu
# Set device = cuda if a GPU is available

# PPO hyper-parameters
total_timesteps = 20_000_000
learning_rate = 3e-4
gamma = 0.995
gae_lambda = 0.95
update_epochs = 4
clip_coef = 0.2
vf_coef = 1.0
ent_coef = 0.005
max_grad_norm = 0.5
anneal_lr = True

# Rollout / batch shape
# batch_size = num_envs * bptt_horizon  (one gradient update worth of data)
bptt_horizon = 16
minibatch_size = 2048

# Checkpoint saving interval (gradient updates)
checkpoint_interval = 200

# Evaluation interval (global steps). Policy benchmarked against fixed negamax depths.
eval_interval = 50000
# Negamax depths to evaluate against (comma-separated)
eval_depths = 1,2,3,5
# Games per depth during periodic eval (keep small to limit overhead)
eval_n_games = 50

[policy]
# Hidden size for the base MLP
hidden_size = 256

[rnn]
# Hidden size for the LSTM wrapper (must equal policy.hidden_size)
hidden_size = 256

[curriculum]
# Fraction of total_timesteps at which each phase starts.
# Phases: random → negamax_d1 → negamax_d2 → negamax_d3 → negamax_d5 → self_play
phase_0_fraction = 0.00
phase_1_fraction = 0.10
phase_2_fraction = 0.25
phase_3_fraction = 0.40
phase_4_fraction = 0.60
phase_5_fraction = 0.75

# Self-play snapshot pool settings
self_play_pool_capacity = 20
self_play_refresh_interval = 50000
